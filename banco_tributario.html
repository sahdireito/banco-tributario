      A: "A ação correta a ser manejada seria a ação anulatória tributária.",

    fundamento: "Art. 156 da CF/88: os Municípios têm competência para instituir apenas IPTU, ITBI e ISS. A lista é taxativa — não há autorização para criar outros impostos. A competência residual para novos impostos pertence exclusivamente à União (art. 154, I, CF/88).",
    caqui: "Município tem três impostos: IPTU, ITBI e ISS. Acabou. Se aparecer qualquer outro imposto municipal na prova, pode riscar — é inconstitucional. A banca adora criar distrações com anterioridade e espécie normativa, mas o problema real é sempre a competência. Foque nisso."

      A: "Correta! O IPTU é imposto de competência municipal. Apenas o próprio Município pode conceder isenção. A isenção heterônoma — quando um ente concede isenção de tributo de outro — é expressamente proibida pelo art. 151, III, da CF/88.",

  {

  {

let current = 0;
const estado = Array(QUESTOES.length).fill(null);

function init() {
  const nav = document.getElementById('nav-wrap');
  const container = document.getElementById('questions-container');
  QUESTOES.forEach((q, i) => {
    const nb = document.createElement('button');
    nb.className = 'nav-btn' + (i === 0 ? ' active' : '');
    nb.textContent = i + 1;
    nb.onclick = () => goTo(i);
    nb.id = 'nav-' + i;
    nav.appendChild(nb);
    const card = document.createElement('div');
    card.className = 'q-card' + (i === 0 ? ' visible' : '');
    card.id = 'card-' + i;
    card.innerHTML = buildCard(q, i);
    container.appendChild(card);
  });
  updatePagination();
  updateScore();
}

function buildCard(q, i) {
  const alts = Object.entries(q.alternativas).map(([letra, texto]) =>
    `<button class="alt-btn" onclick="responder(${i}, '${letra}', this)" data-letra="${letra}">
      <span class="alt-letter">${letra}</span>
      <span class="alt-text">${texto}</span>
    </button>`
  ).join('');
  return `
    <div class="q-header">
      <span class="q-num">Questão ${q.num}</span>
      ${q.exame ? `<span class="q-exame">${q.exame}</span>` : ''}
    </div>
    <h2 class="q-titulo">${q.titulo}</h2>
    <div class="enunciado">${q.enunciado}</div>
    <p class="comando">${q.comando}</p>
    <div class="alternativas" id="alts-${i}">${alts}</div>
    <div class="feedback" id="fb-${i}"></div>
    <div class="fundamento-box" id="fund-${i}">
      <h4>📖 Fundamento legal</h4>
      ${q.fundamento}
    </div>
    <div class="caqui-box" id="caqui-${i}">
      <h4>🍊 Explicação didática do Professor Caqui</h4>
      ${q.caqui}
    </div>
    <div class="card-actions">
      <div class="btn-group">
        <button class="btn green" id="btn-fund-${i}" onclick="toggleFund(${i})">Ver fundamento legal</button>
        <button class="btn caqui" id="btn-caqui-${i}" onclick="toggleCaqui(${i})">Explicação do Prof. Caqui</button>
        <button class="btn" id="btn-reset-${i}" onclick="resetQ(${i})">↺ Tentar novamente</button>
      </div>
      <span class="status-text" id="status-${i}"></span>
    </div>`;
}

function responder(idx, letra, btn) {
  if (estado[idx] !== null) return;
  estado[idx] = letra;
  const q = QUESTOES[idx];
  document.querySelectorAll(`#alts-${idx} .alt-btn`).forEach(b => {
    b.disabled = true;
    if (b.dataset.letra === q.gabarito) b.classList.add('correct');
    if (b.dataset.letra === letra && letra !== q.gabarito) b.classList.add('wrong');
  });
  const acertou = letra === q.gabarito;
  const fb = document.getElementById('fb-' + idx);
  fb.className = 'feedback show ' + (acertou ? 'acerto' : 'erro');
  fb.innerHTML = `<strong>${acertou ? '✓ Correta!' : '✗ Incorreta.'}</strong> ${q.feedbacks[letra]}`;
  document.getElementById('status-' + idx).textContent = acertou ? 'Acerto!' : 'Gabarito: ' + q.gabarito;
  document.getElementById('btn-reset-' + idx).className = 'btn show';
  document.getElementById('btn-fund-' + idx).className = 'btn green show';
  document.getElementById('btn-caqui-' + idx).className = 'btn caqui show';
  const navBtn = document.getElementById('nav-' + idx);
  navBtn.classList.remove('active');
  navBtn.classList.add(acertou ? 'correto' : 'errado');
  if (idx === current) navBtn.classList.add('active');
  updateScore();
}

function toggleFund(idx) {
  const box = document.getElementById('fund-' + idx);
  const btn = document.getElementById('btn-fund-' + idx);
  const visible = box.classList.contains('show');
  box.className = visible ? 'fundamento-box' : 'fundamento-box show';
  btn.textContent = visible ? 'Ver fundamento legal' : 'Ocultar fundamento';
}

function toggleCaqui(idx) {
  const box = document.getElementById('caqui-' + idx);
  const btn = document.getElementById('btn-caqui-' + idx);
  const visible = box.classList.contains('show');
  box.className = visible ? 'caqui-box' : 'caqui-box show';
  btn.textContent = visible ? 'Explicação do Prof. Caqui' : 'Ocultar explicação';
}

function resetQ(idx) {
  estado[idx] = null;
  document.querySelectorAll(`#alts-${idx} .alt-btn`).forEach(b => { b.disabled = false; b.className = 'alt-btn'; });
  document.getElementById('fb-' + idx).className = 'feedback';
  document.getElementById('fund-' + idx).className = 'fundamento-box';
  document.getElementById('btn-fund-' + idx).className = 'btn green';
  document.getElementById('btn-fund-' + idx).textContent = 'Ver fundamento legal';
  document.getElementById('caqui-' + idx).className = 'caqui-box';
  document.getElementById('btn-caqui-' + idx).className = 'btn caqui';
  document.getElementById('btn-caqui-' + idx).textContent = 'Explicação do Prof. Caqui';
  document.getElementById('btn-reset-' + idx).className = 'btn';
  document.getElementById('status-' + idx).textContent = '';
  document.getElementById('nav-' + idx).className = 'nav-btn' + (idx === current ? ' active' : '');
  updateScore();
}

function goTo(idx) {
  document.getElementById('card-' + current).classList.remove('visible');
  document.getElementById('nav-' + current).classList.remove('active');
  current = idx;
  document.getElementById('card-' + current).classList.add('visible');
  document.getElementById('nav-' + current).classList.add('active');
  updatePagination();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navPage(dir) {
  const next = current + dir;
  if (next >= 0 && next < QUESTOES.length) goTo(next);
}

function updatePagination() {
  document.getElementById('pg-info').textContent = (current + 1) + ' de ' + QUESTOES.length;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === QUESTOES.length - 1;
}

function updateScore() {
  const respondidas = estado.filter(e => e !== null).length;
  const acertos = estado.filter((e, i) => e === QUESTOES[i].gabarito).length;
  const erros = respondidas - acertos;
  document.getElementById('sc-total').textContent = respondidas;
  document.getElementById('sc-acertos').textContent = acertos;
  document.getElementById('sc-erros').textContent = erros;
  const pct = Math.round((respondidas / QUESTOES.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = respondidas + ' de ' + QUESTOES.length + ' respondidas';
}

init();
</script>
</body>
